<style>
/* 现代化设计风格 - 参考Ant Design风格 */

:root {
    --primary-color: #1890ff;
    --success-color: #52c41a;
    --info-color: #13c2c2;
    --warning-color: #faad14;
    --danger-color: #ff4d4f;
    --text-primary: #262626;
    --text-secondary: #8c8c8c;
    --border-color: #f0f0f0;
    --card-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03), 0 1px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px 0 rgba(0, 0, 0, 0.02);
    --card-shadow-hover: 0 3px 6px -4px rgba(0, 0, 0, 0.12), 0 6px 16px 0 rgba(0, 0, 0, 0.08), 0 9px 28px 8px rgba(0, 0, 0, 0.05);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

.container-fluid {
    padding: 16px;
}

/* 现代化卡片设计 */
.card {
    border: none;
    border-radius: 8px;
    box-shadow: var(--card-shadow);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
}

.card:hover {
    box-shadow: var(--card-shadow-hover);
}

.card-header {
    background: linear-gradient(to right, #fafafa, #f5f5f5);
    border-bottom: 1px solid var(--border-color);
    padding: 16px 20px;
}

.resource-card {
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background: linear-gradient(135deg, #ffffff 0%, #fafafa 100%);
    box-shadow: var(--card-shadow);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

.resource-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary-color), var(--info-color));
    opacity: 0;
    transition: opacity 0.3s ease;
}

.resource-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--card-shadow-hover);
}

.resource-card:hover::before {
    opacity: 1;
}

.resource-header {
    color: #495057;
    font-weight: 600;
    font-size: 0.8rem;
    margin-bottom: 6px;
}

.resource-header i {
    color: #6c757d;
    margin-right: 4px;
    font-size: 0.85rem;
}

/* 响应式设计 */
@media (max-width: 1200px) {
    .resource-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 768px) {
    .resource-grid {
        grid-template-columns: 1fr;
        gap: 10px;
    }
    
    .resource-grid-item {
        padding: 12px;
    }
    
    .resource-value {
        font-size: 1.1rem;
        margin-bottom: 8px;
    }
    
    .resource-header {
        font-size: 0.75rem;
    }
    
    .progress {
        height: 4px;
    }
}

.resource-value.text-primary {
    color: #007bff !important;
}

.resource-value.text-success {
    color: #28a745 !important;
}

.resource-value.text-info {
    color: #17a2b8 !important;
}

.resource-value.text-warning {
    color: #ffc107 !important;
}

.progress {
    height: 5px;
    border-radius: 3px;
    background-color: #e9ecef;
    border: 1px solid #dee2e6;
}

.progress-bar {
    border-radius: 3px;
    transition: width 0.3s ease;
    height: 100%;
}

.progress-primary {
    background-color: #007bff !important;
}

.progress-success {
    background-color: #28a745 !important;
}

.progress-info {
    background-color: #17a2b8 !important;
}

.progress-warning {
    background-color: #ffc107 !important;
}

.progress-danger {
    background-color: #dc3545 !important;
}

.resource-icon {
    opacity: 0.15;
    color: #6c757d;
    font-size: 1.5rem !important;
}

.badge {
    font-size: 0.8rem;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 4px;
}

.badge-info {
    background: #d1ecf1;
    color: #0c5460;
    border: 1px solid #bee5eb;
}

.badge-secondary {
    background: #6c757d;
    color: white;
}

.badge-success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

/* 一排4个卡片 - 更紧凑的布局 */
.resource-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    min-height: auto;
}

.resource-grid-item {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 12px;
    height: 100%;
}

.resource-value {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
    min-height: 1.4rem;
    display: flex;
    align-items: center;
}

/* Chart.js 图表样式 */
canvas {
    width: 100% !important;
    height: 150px !important;
}
</style>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// 等待 Chart.js 加载
window.chartJsLoaded = false;
if (typeof Chart !== 'undefined') {
    window.chartJsLoaded = true;
} else {
    // 轮询检查 Chart.js 是否加载
    const checkChart = setInterval(() => {
        if (typeof Chart !== 'undefined') {
            window.chartJsLoaded = true;
            clearInterval(checkChart);
        }
    }, 50);
}
</script>

<div class="container-fluid">

        <div class="card">

<script>
const INFO_DEBUG_MODE = false;

var currentInfoContainerId = '';
var cpuChart, memoryChart, diskChart, trafficChart;

function infoDebug(message, data) {
    if (INFO_DEBUG_MODE) {
        console.log('[INFO-DEBUG]', message, data);
    }
}

// 初始化 Chart.js 图表
function initCharts() {
    const maxDataPoints = 30;
    const labels = Array(maxDataPoints).fill('');

    const baseConfig = {
        type: 'line',
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    titleFont: { size: 12 },
                    bodyFont: { size: 11 },
                    padding: 8,
                    cornerRadius: 4,
                    displayColors: false,
                    callbacks: {
                        label: function(context) {
                            return context.parsed.y + '%';
                        }
                    }
                }
            },
            scales: {
                x: { 
                    display: false,
                    grid: { display: false }
                },
                y: {
                    beginAtZero: true,
                    max: 100,
                    grid: { 
                        color: 'rgba(0, 0, 0, 0.05)',
                        drawBorder: false
                    },
                    ticks: { 
                        color: '#999', 
                        font: { size: 10 },
                        stepSize: 25,
                        callback: function(value) {
                            return value + '%';
                        }
                    },
                    border: { display: false }
                }
            },
            elements: {
                line: { 
                    tension: 0.4, 
                    borderWidth: 2,
                    borderJoinStyle: 'round'
                },
                point: { 
                    radius: 0, 
                    hitRadius: 10, 
                    hoverRadius: 4,
                    hoverBorderWidth: 2
                }
            },
            interaction: {
                intersect: false,
                mode: 'index'
            }
        }
    };

    cpuChart = new Chart(document.getElementById('cpuChart'), {
        ...baseConfig,
        data: {
            labels: labels,
            datasets: [{ 
                data: Array(maxDataPoints).fill(0), 
                borderColor: '#1890ff', 
                backgroundColor: 'rgba(24, 144, 255, 0.1)', 
                fill: true,
                fillTension: 0.4
            }]
        }
    });

    memoryChart = new Chart(document.getElementById('memoryChart'), {
        ...baseConfig,
        data: {
            labels: labels,
            datasets: [{ 
                data: Array(maxDataPoints).fill(0), 
                borderColor: '#52c41a', 
                backgroundColor: 'rgba(82, 196, 26, 0.1)', 
                fill: true,
                fillTension: 0.4
            }]
        }
    });

    diskChart = new Chart(document.getElementById('diskChart'), {
        ...baseConfig,
        data: {
            labels: labels,
            datasets: [{ 
                data: Array(maxDataPoints).fill(0), 
                borderColor: '#13c2c2', 
                backgroundColor: 'rgba(19, 194, 194, 0.1)', 
                fill: true,
                fillTension: 0.4
            }]
        }
    });

    trafficChart = new Chart(document.getElementById('trafficChart'), {
        ...baseConfig,
        data: {
            labels: labels,
            datasets: [{ 
                data: Array(maxDataPoints).fill(0), 
                borderColor: '#faad14', 
                backgroundColor: 'rgba(250, 173, 20, 0.1)', 
                fill: true,
                fillTension: 0.4
            }]
        }
    });
}

function updateChart(chart, value) {
    if (!chart) return;
    const data = chart.data.datasets[0].data;
    data.shift();
    data.push(value);
    chart.update('none');
}

// 更新进度条
function updateProgress(elementId, value) {
    const element = document.getElementById(elementId);
    if (element) {
        element.style.width = value + '%';
        // 根据使用率改变颜色
        if (value >= 90) {
            element.style.backgroundColor = 'var(--danger-color)';
        } else if (value >= 70) {
            element.style.backgroundColor = 'var(--warning-color)';
        }
    }
}

function refreshInfoPage() {
    infoDebug('手动刷新信息页面');
    updateLastUpdateTime();
    loadContainerInfo();
}

window.refreshInfoPage = refreshInfoPage;

// 获取主机名称配置
function getHostName() {
    // 可以从全局配置或隐藏字段获取，默认使用'default'
    return window.hostName || 'default';
}

function updateLastUpdateTime() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('zh-CN', {
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const lastUpdateElement = document.getElementById('last-update');
    if (lastUpdateElement) {
        lastUpdateElement.textContent = timeString;
    }
}

function loadContainerInfo() {
    if (!currentInfoContainerId) {
        const urlParams = new URLSearchParams(window.location.search);
        const containerId = urlParams.get('id');

        if (!containerId) {
            showError('无法获取容器ID');
            return;
        }
        currentInfoContainerId = containerId;
    }

    $('#last-update').html('<i class="fas fa-spinner fa-spin"></i> 更新中...');
    loadAllInfoData(currentInfoContainerId);
}

function loadAllInfoData(containerId) {
    const timestamp = new Date().getTime();
    const hs_name = getHostName(); // 从配置或页面获取主机名称
    const infoUrl = `/provision/custom/content?id=${containerId}&key=info&action=getinfoall&hs_name=${hs_name}&vm_uuid=${containerId}&_t=${timestamp}`;

    infoDebug('API请求', infoUrl);

    $.ajax({
        url: infoUrl,
        method: 'GET',
        dataType: 'json',
        timeout: 10000,
        cache: false,
        success: function(response) {
            infoDebug('API响应', response);
            if (response && response.code === 200 && response.data) {
                updateAllInfo(response.data);
            } else {
                showError(response.msg || '获取容器信息失败');
            }
        },
        error: function(xhr, status, error) {
            infoDebug('API请求失败', {status: xhr.status, error: error});
            showError('网络请求失败: ' + error);
        }
    });
}

function updateAllInfo(data) {
    // OpenIDCS API响应格式适配
    const cpuUsage = parseFloat(data.cpu_usage) || 0;
    const cpuCores = data.config?.cpus || 1;
    const cpuUsageFormatted = cpuUsage.toFixed(1);
    $('#cpu-info').html(`<span class="font-weight-bold">${cpuUsageFormatted}%</span><span class="text-muted" style="font-size: 0.8rem"> / ${cpuCores}核</span>`);
    updateChart(cpuChart, cpuUsage);
    updateProgress('cpu-progress', cpuUsage);

    const memoryUsage = data.memory_usage || 'N/A';
    const memoryTotal = data.config?.memory || 'N/A';
    const memoryPercent = parseFloat(data.memory_percent) || 0;
    $('#memory-info').html(`<span class="font-weight-bold">${memoryUsage}</span><span class="text-muted" style="font-size: 0.8rem"> / ${memoryTotal}</span>`);
    updateChart(memoryChart, memoryPercent);
    updateProgress('memory-progress', memoryPercent);

    function formatDiskSize(value) {
        if (typeof value === 'string') return value;
        const num = parseFloat(value);
        if (isNaN(num)) return 'N/A';
        return num + ' MB';
    }

    const diskUsage = data.disk_usage || 'N/A';
    let diskTotal = 'N/A';
    
    if (data.config?.disk) {
        diskTotal = formatDiskSize(data.config.disk);
    } else if (data.disk) {
        diskTotal = formatDiskSize(data.disk);
    }
    
    const diskPercent = parseFloat(data.disk_percent) || 0;
    $('#disk-info').html(`<span class="font-weight-bold">${diskUsage}</span><span class="text-muted" style="font-size: 0.8rem"> / ${diskTotal}</span>`);
    updateChart(diskChart, diskPercent);
    updateProgress('disk-progress', diskPercent);

    const trafficUsage = data.traffic_usage || 'N/A';
    const trafficUsageRaw = data.traffic_usage_raw || 0;
    const trafficLimit = data.config?.traffic_limit || 0;
    
    if (trafficLimit > 0) {
        const trafficLimitGB = trafficLimit;
        const trafficUsageGB = (trafficUsageRaw / (1024 * 1024 * 1024)).toFixed(2);
        const trafficPercent = Math.min((parseFloat(trafficUsageGB) / trafficLimitGB) * 100, 100).toFixed(1);
        
        $('#traffic-info').html(`<span class="font-weight-bold">${trafficUsageGB} GB</span><span class="text-muted" style="font-size: 0.8rem"> / ${trafficLimitGB} GB</span>`);
        updateChart(trafficChart, parseFloat(trafficPercent));
        updateProgress('traffic-progress', parseFloat(trafficPercent));
    } else {
        $('#traffic-info').html(`<span class="font-weight-bold">累计</span><span class="text-muted" style="font-size: 0.8rem">: ${trafficUsage}</span>`);
        updateChart(trafficChart, 0);
        updateProgress('traffic-progress', 0);
    }

    if (data.last_update) {
        $('#last-update').text(data.last_update);
    } else {
        updateLastUpdateTime();
    }
}

function showError(message) {
    $('#cpu-info').text('加载失败');
    $('#memory-info').text('加载失败');
    $('#disk-info').text('加载失败');
    $('#traffic-info').text('加载失败');

    const now = new Date();
    const timeString = now.toLocaleTimeString('zh-CN', {
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    $('#last-update').text(`${timeString} (错误)`);
    infoDebug('加载错误', message);
}

$(document).ready(function() {
    // 等待 Chart.js 加载完成
    const waitForChart = setInterval(function() {
        if (window.chartJsLoaded || typeof Chart !== 'undefined') {
            clearInterval(waitForChart);
            
            // 初始化图表
            initCharts();
            
            const urlParams = new URLSearchParams(window.location.search);
            const containerId = urlParams.get('id');

            if (!containerId) {
                showError('无法获取容器ID');
                return;
            }

            currentInfoContainerId = containerId;
            infoDebug('设置容器ID', containerId);

            updateLastUpdateTime();

            loadContainerInfo();

            setInterval(function() {
                infoDebug('定时器触发，刷新容器信息');
                loadContainerInfo();
            }, 10000);
        }
    }, 50);
    
    // 5秒超时保护
    setTimeout(function() {
        clearInterval(waitForChart);
        if (!cpuChart) {
            console.error('Chart.js 加载超时');
        }
    }, 5000);
});
</script>
